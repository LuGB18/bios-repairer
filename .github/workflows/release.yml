name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.os }} / ${{ matrix.script }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        script: [bios_heal, bios_flash]
        include:
          - os: windows-latest
            os_label: windows-x86_64
            ext: .exe
          - os: ubuntu-latest
            os_label: linux-x86_64
            ext: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Build single-file binary
        run: pyinstaller --onefile --name ${{ matrix.script }} ${{ matrix.script }}.py

      - name: Rename artifact (platform suffix)
        shell: bash
        run: |
          SRC="dist/${{ matrix.script }}${{ matrix.ext }}"
          DST="dist/${{ matrix.script }}-${{ matrix.os_label }}${{ matrix.ext }}"
          if [ -f "$SRC" ]; then
            mv "$SRC" "$DST"
          fi
          ls -la dist/

      - name: Smoke run --version on built binary (Linux)
        if: runner.os == 'Linux'
        run: |
          BIN="dist/${{ matrix.script }}-${{ matrix.os_label }}"
          chmod +x "$BIN"
          "./$BIN" --version

      - name: Smoke run --version on built binary (Windows)
        if: runner.os == 'Windows'
        run: dist\${{ matrix.script }}-${{ matrix.os_label }}${{ matrix.ext }} --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.script }}-${{ matrix.os_label }}
          path: dist/${{ matrix.script }}-${{ matrix.os_label }}${{ matrix.ext }}

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Inspect artifacts
        run: ls -la artifacts/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          body_path: CHANGELOG.md
          fail_on_unmatched_files: true

  pypi:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Opt-in: only runs when the repo variable PUBLISH_TO_PYPI is set to
    # "true" (Settings -> Secrets and variables -> Actions -> Variables).
    # This lets tag pushes build binaries + create a GitHub Release
    # without ever shipping to PyPI until the operator is ready.
    if: startsWith(github.ref, 'refs/tags/v') && vars.PUBLISH_TO_PYPI == 'true'
    # Trusted Publishing OIDC token (used when password is not supplied);
    # harmless if PyPI-side trusted publishing is not configured and the
    # PYPI_API_TOKEN secret is set instead.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build wheel + sdist
        run: python -m build

      - name: twine check
        run: python -m twine check dist/*

      - name: Publish to PyPI
        # Uses the PYPI_API_TOKEN secret if present, otherwise falls back
        # to Trusted Publishing via the OIDC id-token issued above.
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
