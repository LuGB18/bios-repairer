name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: bios_heal.exe
            target_name: bios_heal-windows-x86_64.exe
          - os: ubuntu-latest
            artifact: bios_heal
            target_name: bios_heal-linux-x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Build single-file binary
        run: pyinstaller --onefile --name bios_heal bios_heal.py

      - name: Rename artifact (platform suffix)
        shell: bash
        run: |
          if [ -f "dist/${{ matrix.artifact }}" ]; then
            mv "dist/${{ matrix.artifact }}" "dist/${{ matrix.target_name }}"
          fi
          ls -la dist/

      - name: Smoke run --version on the built binary
        if: runner.os == 'Linux'
        run: |
          chmod +x "dist/${{ matrix.target_name }}"
          "./dist/${{ matrix.target_name }}" --version

      - name: Smoke run --version (Windows)
        if: runner.os == 'Windows'
        run: dist\${{ matrix.target_name }} --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target_name }}
          path: dist/${{ matrix.target_name }}

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Inspect artifacts
        run: ls -la artifacts/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          body_path: CHANGELOG.md
          fail_on_unmatched_files: true
