coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        if_not_found: success
    patch:
      default:
        target: 80%
        threshold: 5%
        if_not_found: success
  precision: 2
  round: down
  range: "70...100"

ignore:
  - "tests/"
  - "conftest.py"

comment:
  layout: "header, diff, files"
  behavior: default
  require_changes: true
  require_base: false
  require_head: true

github_checks:
  annotations: true
